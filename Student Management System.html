<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Management System</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f4f4;
padding:20px;
}

.container{
max-width:1100px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:20px;
color:#2563eb;
}

.form{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:10px;
margin-bottom:20px;
}

input,select{
padding:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:10px;
border:none;
background:#2563eb;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.search{
margin-bottom:20px;
}

.search input{
width:100%;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:#2563eb;
color:white;
padding:15px;
border-radius:10px;
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#2563eb;
color:white;
}

.delete-btn{
background:red;
padding:6px 10px;
}

.delete-btn:hover{
background:darkred;
}
</style>
</head>

<body>

<div class="container">

<h1>🏫 Student Management System</h1>

<div class="cards">
<div class="card">
<h3>Total Students</h3>
<h2 id="totalStudents">0</h2>
</div>

<div class="card">
<h3>Average Percentage</h3>
<h2 id="avgPercentage">0%</h2>
</div>
</div>

<div class="form">

<input type="text" id="name" placeholder="Student Name">

<input type="text" id="roll" placeholder="Roll Number">

<select id="department">
<option>CSE</option>
<option>CSE(AIML)</option>
<option>ECE</option>
<option>EEE</option>
<option>MECH</option>
</select>

<input type="number" id="marks" placeholder="Marks">

<button onclick="addStudent()">Add Student</button>

</div>

<div class="search">
<input type="text" id="search" placeholder="Search Student..." onkeyup="searchStudent()">
</div>

<table>

<thead>
<tr>
<th>Name</th>
<th>Roll No</th>
<th>Department</th>
<th>Marks</th>
<th>Percentage</th>
<th>Grade</th>
<th>Action</th>
</tr>
</thead>

<tbody id="studentTable"></tbody>

</table>

</div>

<script>

let students =
JSON.parse(localStorage.getItem("students")) || [];

function saveData(){
localStorage.setItem(
"students",
JSON.stringify(students)
);
}

function getGrade(mark){

if(mark >= 90) return "A+";
if(mark >= 80) return "A";
if(mark >= 70) return "B";
if(mark >= 60) return "C";

return "F";
}

function addStudent(){

const name =
document.getElementById("name").value;

const roll =
document.getElementById("roll").value;

const department =
document.getElementById("department").value;

const marks =
parseInt(document.getElementById("marks").value);

if(!name || !roll || isNaN(marks)){
alert("Fill all fields");
return;
}

students.push({
name,
roll,
department,
marks
});

saveData();
renderStudents();

document.getElementById("name").value="";
document.getElementById("roll").value="";
document.getElementById("marks").value="";
}

function deleteStudent(index){

students.splice(index,1);

saveData();
renderStudents();
}

function renderStudents(data = students){

const table =
document.getElementById("studentTable");

table.innerHTML="";

let totalMarks = 0;

data.forEach((student,index)=>{

const percentage = student.marks;
const grade = getGrade(student.marks);

totalMarks += student.marks;

table.innerHTML += `
<tr>
<td>${student.name}</td>
<td>${student.roll}</td>
<td>${student.department}</td>
<td>${student.marks}</td>
<td>${percentage}%</td>
<td>${grade}</td>
<td>
<button class="delete-btn"
onclick="deleteStudent(${index})">
Delete
</button>
</td>
</tr>
`;

});

document.getElementById("totalStudents").innerText =
students.length;

const avg =
students.length
? (students.reduce((a,b)=>a+b.marks,0)
/ students.length).toFixed(1)
: 0;

document.getElementById("avgPercentage").innerText =
avg + "%";
}

function searchStudent(){

const keyword =
document.getElementById("search").value.toLowerCase();

const filtered =
students.filter(student =>
student.name.toLowerCase().includes(keyword) ||
student.roll.toLowerCase().includes(keyword)
);

renderStudents(filtered);
}

renderStudents();

</script>

</body>
</html>
